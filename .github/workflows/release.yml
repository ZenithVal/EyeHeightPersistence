name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        default: 'v1.0.0'

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: Inject Version Number
      shell: pwsh
      run: |
        $file = "Program.cs" 
        $content = Get-Content $file
        $content = $content -replace '\{VERSION_PLACEHOLDER\}', '${{ github.event.inputs.version }}'
        Set-Content -Path $file -Value $content

    - name: Publish Single-File Executable
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: Release ${{ github.event.inputs.version }}
        files: ./publish/EyeHeightPersistence.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}